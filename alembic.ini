# Alembic Configuration

[alembic]

# path to migration scripts
script_location = alembic

# template for creating migration file
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path
# prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# and filenames.  Leave blank for localtime.
# timezone =

# Override via DATABASE_URL env var or alembic/env.py.
# This default is only used if env.py cannot load Settings.
sqlalchemy.url = postgresql://original:original@localhost:5432/original_db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
