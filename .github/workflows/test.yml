name: Tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest tests/ validation/test_tier10_optional.py -q

  bluebook-e2e:
    runs-on: ubuntu-latest
    needs: pytest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: demo/bluebook/package-lock.json

      - name: Install Python dependencies (server)
        run: pip install -r requirements-demo.txt

      - name: Install spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Install Bluebook test dependencies
        run: cd demo/bluebook && npm ci

      - name: Install Playwright browsers
        run: cd demo/bluebook && npx playwright install --with-deps chromium

      - name: Start Original demo server in pilot mode
        env:
          ORIGINAL_ENV: pilot
          SECRET_KEY: ci-test-only-secret-do-not-deploy
          MAINTENANCE_TOKEN: ci-test-only
        run: |
          python run.py --demo --frontend-dir demo --port 8001 \
            > /tmp/original-ci.log 2>&1 &
          echo $! > /tmp/original.pid
          # Wait for server to become responsive (up to 30s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8001/health > /dev/null; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start. Log:"
          cat /tmp/original-ci.log
          exit 1

      - name: Run Playwright E2E tests
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:8001
        run: cd demo/bluebook && npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: demo/bluebook/playwright-report/
          retention-days: 14

      - name: Stop Original server
        if: always()
        run: kill $(cat /tmp/original.pid) 2>/dev/null || true
