services:
  # ════════════════════════════════════════════════════════════════════════════
  # original-demo — the always-live, zero-login SALES DEMO (free tier).
  # Ephemeral by design: writes reset on each deploy; seeded from demo/seed.db.
  # ════════════════════════════════════════════════════════════════════════════
  - type: web
    name: original-demo
    runtime: python
    region: oregon
    plan: free

    # Slim install — requirements-demo.txt excludes PyTorch/sentence-transformers,
    # psycopg2, sqlalchemy, auth libs, and dev tools. Keeps the build under
    # Render's free-tier memory ceiling and within the 20-min build timeout.
    buildCommand: pip install -r requirements-demo.txt && python -m spacy download en_core_web_sm

    # --skip-seed: synthetic student profiles are pre-baked into demo/seed.db
    # (committed to the repo). Startup takes <1s — no ML pipeline runs at boot.
    startCommand: python run.py --demo --port $PORT --skip-seed

    healthCheckPath: /health

    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      # Point the store at the pre-seeded SQLite file shipped in the repo.
      - key: ORIGINAL_DB
        value: demo/seed.db
      # Adaptive scoring phases 2-8 (context manifest + weight modification).
      - key: CONTEXT_MANIFEST_ENABLED
        value: "1"
      - key: ADAPTIVE_WEIGHTS_ENABLED
        value: "1"

  # ════════════════════════════════════════════════════════════════════════════
  # original-pilot — the REAL institutional pilot (Starter plan + persistent
  # disk). Same dashboard app, hardened by ORIGINAL_ENV=pilot:
  #   • boots REFUSE to start without a stable SECRET_KEY (fail-fast)
  #   • CORS locked to ALLOWED_ORIGINS (empty = nothing allowed)
  #   • HSTS on; destructive endpoints guarded by MAINTENANCE_TOKEN
  # Secrets (sync: false) are set once in the Render dashboard, never in git.
  # ════════════════════════════════════════════════════════════════════════════
  - type: web
    name: original-pilot
    runtime: python
    region: oregon
    plan: starter

    # Demo deps + LTI crypto (python-jose/cryptography). Full requirements.txt
    # pulls PyTorch and will not fit Starter — do not "upgrade" this.
    buildCommand: pip install -r requirements-pilot.txt && python -m spacy download en_core_web_sm

    # --skip-seed: a pilot must never boot with synthetic students. The store
    # starts empty on first deploy; real tenants/professors are provisioned via
    # docs/PROVISIONING_CHECKLIST.md.
    startCommand: python run.py --demo --port $PORT --skip-seed

    healthCheckPath: /health

    disk:
      name: profiles-db
      mountPath: /data
      sizeGB: 1

    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: ORIGINAL_DB
        value: /data/profiles.db
      # ── Hardening mode: pilot fails fast without SECRET_KEY ──
      - key: ORIGINAL_ENV
        value: pilot
      # Stable signing key — set in dashboard. Generate:
      #   python -c "import secrets; print(secrets.token_urlsafe(64))"
      - key: SECRET_KEY
        sync: false
      # Guard token for destructive/provisioning endpoints (X-Guard-Token).
      - key: MAINTENANCE_TOKEN
        sync: false
      - key: GUARD_DESTRUCTIVE
        value: "1"
      # Lock CORS to the public URL of THIS service (update if custom domain).
      - key: ALLOWED_ORIGINS
        value: https://original-pilot.onrender.com
      - key: ENABLE_HSTS
        value: "1"
      # ── LTI 1.3 (Canvas) ──
      - key: LTI_TOOL_URL
        value: https://original-pilot.onrender.com
      # Tool RSA private key (PEM, \n-escaped). Generate: openssl genrsa 2048
      - key: LTI_PRIVATE_KEY
        sync: false
      # JSON array of registered platforms — set after the Canvas admin returns
      # the client_id/deployment_id (see docs/CANVAS_RUNBOOK.md).
      - key: LTI_PLATFORMS
        sync: false
      # Adaptive scoring phases (same as demo).
      - key: CONTEXT_MANIFEST_ENABLED
        value: "1"
      - key: ADAPTIVE_WEIGHTS_ENABLED
        value: "1"
