services:
  - type: web
    name: original-demo
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: python run.py --demo --port $PORT --skip-seed
    healthCheckPath: /health
    envVars:
      - key: ORIGINAL_DB
        value: /data/profiles.db
      - key: PYTHON_VERSION
        value: "3.11"
    disk:
      name: profiles-db
      mountPath: /data
      sizeGB: 1
