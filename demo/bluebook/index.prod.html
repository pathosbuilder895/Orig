<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bluebook — Examination Platform</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      background: #001020; color: #F0EDE4; font-family: 'EB Garamond', serif;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    body::after {
      content: ''; position: fixed; inset: -50%; width: 200%; height: 200%;
      pointer-events: none; z-index: 9998; opacity: 0.022;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }
    ::selection { background: rgba(201,169,97,0.28); color: #001020; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #001020; }
    ::-webkit-scrollbar-thumb { background: #0A2D5E; }
    ::-webkit-scrollbar-thumb:hover { background: #C9A961; }
    @keyframes bbFadeIn { from { opacity: 0; } to { opacity: 1; } }
    .bb-screen { animation: bbFadeIn 0.65s ease both; }
    @keyframes bbPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes bbSaveDot { 0% { opacity: 0; transform: scale(0.6); } 20% { opacity: 1; transform: scale(1); } 75% { opacity: 1; } 100% { opacity: 0; } }
    @keyframes bbSlideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    input:focus { border-color: rgba(201,169,97,0.7) !important; outline: none; }
    textarea { caret-color: #C9A961; }
    input:-webkit-autofill, input:-webkit-autofill:focus {
      -webkit-text-fill-color: #F0EDE4; -webkit-box-shadow: 0 0 0 1000px #001C3B inset;
      transition: background-color 5000s;
    }
    button { cursor: pointer; }
    input, textarea, button { font-family: inherit; }
  </style>

  <!-- Production React (minified). No in-browser Babel — the JSX is precompiled. -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Launch bootstrap (LTI / magic-link binding) — runs before the app. -->
  <script>
  (function () {
    try {
      var q = new URLSearchParams(location.search);
      var cfg = window.BB_EXAM_CONFIG = window.BB_EXAM_CONFIG || {};
      if (q.get('sid'))       localStorage.setItem('bluebook_student_id', q.get('sid'));
      if (q.get('email'))     { localStorage.setItem('bluebook_candidate_email', q.get('email')); cfg.candidateEmail = q.get('email'); }
      if (q.get('tenant'))    localStorage.setItem('original_tenant', q.get('tenant'));
      if (q.get('candidate')) cfg.candidate = q.get('candidate');
      if (q.get('exam'))      cfg.title = q.get('exam');
    } catch (e) {}
  })();
  </script>

  <!-- Precompiled bundle (run `npm install && npm run build` to produce it). -->
  <script src="bluebook.bundle.js"></script>
</body>
</html>
