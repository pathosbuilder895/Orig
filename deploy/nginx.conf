# nginx reverse proxy configuration for Original API
# Place in /etc/nginx/sites-available/original
# Enable: ln -sf /etc/nginx/sites-available/original /etc/nginx/sites-enabled/
#
# Prerequisites:
#   sudo apt install nginx certbot python3-certbot-nginx
#   sudo certbot --nginx -d yourdomain.com

# ── Rate limiting zones (defined in http context — add to nginx.conf if not present) ─────
# limit_req_zone $binary_remote_addr zone=api_zone:10m rate=30r/s;
# limit_req_zone $binary_remote_addr zone=auth_zone:5m  rate=2r/s;

upstream original_api {
    server 127.0.0.1:8000;
    keepalive 16;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com;

    # ── SSL (managed by Certbot — paths updated automatically) ────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Security headers (belt-and-suspenders with app-level headers) ─────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Request size limits ───────────────────────────────────────────────
    client_max_body_size 2m;   # essays shouldn't exceed 2MB

    # ── Shared proxy settings ─────────────────────────────────────────────
    # These apply inside each location block below.
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Pass a unique request ID for end-to-end log correlation.
    # If the client supplies one already (e.g. from upstream proxy), honour it.
    proxy_set_header X-Request-ID $request_id;

    # ── LTI 1.3 endpoints (Canvas needs stable URLs — no /api/ prefix) ──────
    # X-Frame-Options must be SAMEORIGIN (not DENY) so Canvas can embed Original.
    location /lti/ {
        proxy_pass http://original_api;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
        # Override the global DENY — Canvas iframes the launch URL.
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    }

    # ── JWKS endpoint (public — Canvas fetches this to verify tool JWTs) ─────
    location = /.well-known/jwks.json {
        proxy_pass http://original_api/lti/jwks;
        proxy_read_timeout 5s;
        access_log off;
        add_header Cache-Control "public, max-age=3600";   # JWKS changes rarely
    }

    # ── Canvas webhook + baseline import endpoints ────────────────────────────
    location /canvas/ {
        proxy_pass http://original_api;
        proxy_read_timeout 60s;   # background scoring can take up to 30s
        proxy_send_timeout 15s;
    }

    # ── Auth endpoints: stricter rate limiting ────────────────────────────
    location /api/v1/auth/ {
        # Uncomment to enable nginx-level rate limiting (requires limit_req_zone above):
        # limit_req zone=auth_zone burst=5 nodelay;
        proxy_pass http://original_api;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }

    # ── Scoring endpoint: read timeout long enough for pipeline ──────────
    location /api/v1/submissions/ {
        # Uncomment to enable nginx-level rate limiting:
        # limit_req zone=api_zone burst=20 nodelay;
        proxy_pass http://original_api;
        proxy_read_timeout 60s;   # feature pipeline can take ~30s on first cold run
        proxy_send_timeout 15s;
    }

    # ── All other API paths ───────────────────────────────────────────────
    location /api/ {
        proxy_pass http://original_api;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    # ── Health + readiness checks (no auth, no rate limit) ────────────────
    location ~ ^/(health|readiness)$ {
        proxy_pass http://original_api;
        proxy_read_timeout 5s;
        access_log off;   # suppress noise from monitoring probes
    }

    # ── Metrics endpoint: restrict to internal network ────────────────────
    location /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://original_api/metrics;
    }

    # ── Frontend static files ─────────────────────────────────────────────
    location / {
        root /opt/original/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively (hash-busted filenames)
        location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Deny access to hidden files ───────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
