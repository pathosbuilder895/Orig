# fly.toml app configuration file generated for orig on 2026-05-13T12:48:52Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'orig'
primary_region = 'ewr'

[build]
  dockerfile = 'Dockerfile.demo'

[env]
  ORIGINAL_DB = '/data/profiles.db'

[[mounts]]
  source = 'profiles_db'
  destination = '/data'
  initial_size = '1gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[[statics]]
  guest_path = '/app/demo'
  url_prefix = '/'
