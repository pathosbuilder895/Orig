app = "original-demo"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.demo"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[env]
  ORIGINAL_DB = "/data/profiles.db"

[mounts]
  source = "profiles_db"
  destination = "/data"
  initial_size = "1gb"

[[statics]]
  guest_path = "/app/demo"
  url_prefix = "/"
